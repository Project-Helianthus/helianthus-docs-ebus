name: Platform Contracts Combined Ref

on:
  workflow_call:
    inputs:
      docs_ebus_ref:
        description: Immutable helianthus-docs-ebus commit
        required: true
        type: string
      docs_ebus_base_ref:
        description: Immutable trusted helianthus-docs-ebus prior commit
        required: true
        type: string
      docs_eebus_ref:
        description: Immutable helianthus-docs-eebus commit
        required: true
        type: string
      eebusreg_ref:
        description: Immutable helianthus-eebusreg commit
        required: true
        type: string
      enforce_through:
        description: Owning milestone enforced by this combined-ref run
        required: true
        type: string
  workflow_dispatch:
    inputs:
      docs_ebus_ref:
        description: Immutable helianthus-docs-ebus commit
        required: true
        type: string
      docs_ebus_base_ref:
        description: Immutable trusted helianthus-docs-ebus prior commit
        required: true
        type: string
      docs_eebus_ref:
        description: Immutable helianthus-docs-eebus commit
        required: true
        type: string
      eebusreg_ref:
        description: Immutable helianthus-eebusreg commit
        required: true
        type: string
      enforce_through:
        description: Owning milestone enforced by this combined-ref run
        required: true
        type: choice
        options:
          - MSP-DOCS-PLATFORM
          - MSP-DOCS-E2
          - MSP-DOCS-CLEAN

permissions:
  contents: read

jobs:
  validate:
    name: Validate Explicit Combined Refs
    runs-on: ubuntu-latest
    steps:
      - name: Reject moving refs
        env:
          DOCS_EBUS_REF: ${{ inputs.docs_ebus_ref }}
          DOCS_EBUS_BASE_REF: ${{ inputs.docs_ebus_base_ref }}
          DOCS_EEBUS_REF: ${{ inputs.docs_eebus_ref }}
          EEBUSREG_REF: ${{ inputs.eebusreg_ref }}
        run: |
          immutable_ref='^[0-9a-fA-F]{40}$'
          [[ "${DOCS_EBUS_REF}" =~ ${immutable_ref} ]]
          [[ "${DOCS_EBUS_BASE_REF}" =~ ${immutable_ref} ]]
          [[ "${DOCS_EEBUS_REF}" =~ ${immutable_ref} ]]
          [[ "${EEBUSREG_REF}" =~ ${immutable_ref} ]]

      - name: Checkout docs-ebus ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Project-Helianthus/helianthus-docs-ebus
          ref: ${{ inputs.docs_ebus_ref }}
          path: combined/docs-ebus
          clean: true
          persist-credentials: false

      - name: Checkout trusted docs-ebus prior manifest
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Project-Helianthus/helianthus-docs-ebus
          ref: ${{ inputs.docs_ebus_base_ref }}
          path: combined/docs-ebus-base
          clean: true
          persist-credentials: false
          sparse-checkout: docs/platform/manifests/eebus-doc-ownership.yaml
          sparse-checkout-cone-mode: false

      - name: Resolve trusted prior manifest
        id: prior_manifest
        shell: bash
        run: |
          prior="${GITHUB_WORKSPACE}/combined/docs-ebus-base/docs/platform/manifests/eebus-doc-ownership.yaml"
          if [[ -e "${prior}" ]]; then
            [[ -f "${prior}" && ! -L "${prior}" ]]
            echo "path=${prior}" >> "${GITHUB_OUTPUT}"
          else
            echo "path=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout docs-eebus ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Project-Helianthus/helianthus-docs-eebus
          ref: ${{ inputs.docs_eebus_ref }}
          path: combined/docs-eebus
          clean: true
          persist-credentials: false

      - name: Checkout eebusreg ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Project-Helianthus/helianthus-eebusreg
          ref: ${{ inputs.eebusreg_ref }}
          path: combined/eebusreg
          clean: true
          persist-credentials: false

      - name: Set up pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.10"

      - name: Install pinned validator dependencies
        run: python -m pip install --disable-pip-version-check -r combined/docs-ebus/requirements-ci.txt

      - name: Validate combined refs
        env:
          PRIOR_MANIFEST: ${{ steps.prior_manifest.outputs.path }}
        run: |
          set --
          if [[ -n "${PRIOR_MANIFEST}" ]]; then
            set -- --prior-manifest "${PRIOR_MANIFEST}"
          fi
          python3 combined/docs-ebus/scripts/validate_platform_contracts.py \
            --mode combined-ref \
            --docs-ebus-root combined/docs-ebus \
            --docs-eebus-root combined/docs-eebus \
            --eebusreg-root combined/eebusreg \
            --docs-ebus-ref "${{ inputs.docs_ebus_ref }}" \
            --docs-eebus-ref "${{ inputs.docs_eebus_ref }}" \
            --eebusreg-ref "${{ inputs.eebusreg_ref }}" \
            --enforce-through "${{ inputs.enforce_through }}" \
            --toolchain-mode exact \
            "$@"
