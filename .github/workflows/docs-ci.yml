name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "docs/platform/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/platform-contracts-combined-ref.yml"
      - "requirements-ci.txt"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "docs/platform/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/platform-contracts-combined-ref.yml"
      - "requirements-ci.txt"

jobs:
  markdown-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: checkouts/docs-ebus
          clean: true
          persist-credentials: false

      - name: Checkout trusted PR base manifest
        if: github.event_name == 'pull_request'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Project-Helianthus/helianthus-docs-ebus
          ref: ${{ github.event.pull_request.base.sha }}
          path: checkouts/docs-ebus-base
          clean: true
          persist-credentials: false

      - name: Materialize trusted prior manifest
        if: github.event_name == 'pull_request'
        id: prior_manifest
        shell: bash
        env:
          TRUSTED_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          base_root="${GITHUB_WORKSPACE}/checkouts/docs-ebus-base"
          manifest_path="docs/platform/manifests/eebus-doc-ownership.yaml"
          materialized_root="${RUNNER_TEMP}/helianthus-trusted-prior-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          materialized="${materialized_root}/eebus-doc-ownership.yaml"

          trusted_type="$(git -C "${base_root}" cat-file -t "${TRUSTED_BASE_REF}")"
          if [[ "${trusted_type}" != "commit" ]]; then
            exit 1
          fi
          trusted_commit="$(git -C "${base_root}" rev-parse --verify "${TRUSTED_BASE_REF}")"
          actual_commit="$(git -C "${base_root}" rev-parse --verify HEAD)"
          if [[ "${actual_commit}" != "${trusted_commit}" ]]; then
            exit 1
          fi

          IFS='/' read -r -a components <<< "${manifest_path}"
          prefix=""
          manifest_oid=""
          manifest_present=true
          last_index=$((${#components[@]} - 1))
          for index in "${!components[@]}"; do
            prefix="${prefix:+${prefix}/}${components[${index}]}"
            entry="$(git -C "${base_root}" ls-tree "${trusted_commit}" -- "${prefix}")"
            if [[ -z "${entry}" ]]; then
              manifest_present=false
              break
            fi
            metadata="${entry%%$'\t'*}"
            read -r mode object_type object_id <<< "${metadata}"
            if ((index < last_index)); then
              if [[ "${mode}" != "040000" || "${object_type}" != "tree" ]]; then
                exit 1
              fi
            else
              if [[ ! "${mode}" =~ ^100(644|755)$ || "${object_type}" != "blob" ]]; then
                exit 1
              fi
              manifest_oid="${object_id}"
            fi
          done

          if [[ "${manifest_present}" == "true" ]]; then
            umask 077
            mkdir -p "${materialized_root}"
            if [[ ! -d "${materialized_root}" || -L "${materialized_root}" ]]; then
              exit 1
            fi
            git -C "${base_root}" cat-file blob "${manifest_oid}" > "${materialized}"
            if [[ ! -f "${materialized}" || -L "${materialized}" ]]; then
              exit 1
            fi
            printf 'path=%s\n' "${materialized}" >> "${GITHUB_OUTPUT}"
          else
            printf 'path=\n' >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare hash-locked pip bootstrap
        run: |
          set -euo pipefail
          bootstrap_dir="${RUNNER_TEMP}/helianthus-pip-bootstrap"
          wheel="${bootstrap_dir}/pip-25.0.1-py3-none-any.whl"
          mkdir -p "${bootstrap_dir}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            --output "${wheel}.part" \
            https://files.pythonhosted.org/packages/c9/bc/b7db44f5f39f9d0494071bddae6880eb645970366d0a200022a1a93d57f5/pip-25.0.1-py3-none-any.whl
          printf '%s  %s\n' \
            c46efd13b6aa8279f33f2864459c8ce587ea6a1a59ee20de055868d8f7688f7f \
            "${wheel}.part" | sha256sum --check --strict
          mv "${wheel}.part" "${wheel}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        env:
          PIP_FIND_LINKS: ${{ runner.temp }}/helianthus-pip-bootstrap
          PIP_NO_INDEX: "1"
        with:
          python-version: "3.12.10"

      - name: Verify pinned Python and pip
        run: |
          python - <<'PY'
          import importlib.metadata
          import sys

          if sys.version_info[:3] != (3, 12, 10):
              raise SystemExit("unexpected Python bootstrap version")
          if importlib.metadata.version("pip") != "25.0.1":
              raise SystemExit("unexpected pip bootstrap version")
          PY

      - name: Install test dependencies
        run: |
          python -m pip install --disable-pip-version-check --no-deps \
            --no-build-isolation --require-hashes \
            -r checkouts/docs-ebus/requirements-ci.txt
          python -m pip check

      - name: Set up Go (for santhosh-tekuri/jsonschema/cmd/jv)
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22.12"

      - name: Install jv (santhosh-tekuri/jsonschema CLI)
        run: |
          go install github.com/santhosh-tekuri/jsonschema/cmd/jv@v0.7.0
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run local docs CI
        env:
          PLATFORM_TOOLCHAIN_MODE: exact
          PLATFORM_PRIOR_MANIFEST: ${{ steps.prior_manifest.outputs.path }}
        working-directory: checkouts/docs-ebus
        run: ./scripts/ci_local.sh

      - name: Enforce main manifest expiry
        if: github.event_name == 'push'
        working-directory: checkouts/docs-ebus
        run: |
          evaluated_at="$(python3 - <<'PY'
          import datetime

          print(
              datetime.datetime.now(datetime.timezone.utc)
              .isoformat()
              .replace("+00:00", "Z")
          )
          PY
          )"
          python3 scripts/validate_platform_contracts.py \
            --mode main-expiry \
            --docs-ebus-root . \
            --evaluated-at "${evaluated_at}" \
            --evaluation-source github.runner.utc_now \
            --enforce-through MSP-DOCS-PLATFORM \
            --toolchain-mode exact

  platform-contracts-combined-ref:
    name: Platform Contracts Combined Ref
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/platform-contracts-combined-ref.yml
    with:
      docs_ebus_repository: ${{ github.event.pull_request.head.repo.full_name }}
      docs_ebus_ref: ${{ github.event.pull_request.head.sha }}
      docs_ebus_base_ref: ${{ github.event.pull_request.base.sha }}
      docs_eebus_ref: f23a7c35e6803501f185923de061f935bbac1466
      eebusreg_ref: 0e58327dfdb86ef243a19e18d590564813feaa00
      enforce_through: MSP-DOCS-PLATFORM
