name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "docs/platform/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/platform-contracts-combined-ref.yml"
      - "requirements-ci.txt"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "docs/platform/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/platform-contracts-combined-ref.yml"
      - "requirements-ci.txt"

jobs:
  markdown-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          clean: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.10"

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Set up Go (for santhosh-tekuri/jsonschema/cmd/jv)
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22.12"

      - name: Install jv (santhosh-tekuri/jsonschema CLI)
        run: |
          go install github.com/santhosh-tekuri/jsonschema/cmd/jv@v0.7.0
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run local docs CI
        run: ./scripts/ci_local.sh

      - name: Enforce main manifest expiry
        if: github.event_name == 'push'
        run: |
          python3 scripts/validate_platform_contracts.py \
            --mode main-expiry \
            --docs-ebus-root . \
            --evaluated-at "${{ github.event.head_commit.timestamp }}" \
            --evaluation-source github.event.head_commit.timestamp \
            --pinned-tool python=3.12.10 \
            --pinned-tool pyyaml=6.0.2
