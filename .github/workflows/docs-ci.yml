name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"

jobs:
  markdown-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest pytest-json-report

      - name: Set up Go (for santhosh-tekuri/jsonschema/cmd/jv)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install jv (santhosh-tekuri/jsonschema CLI)
        run: |
          go install github.com/santhosh-tekuri/jsonschema/cmd/jv@v0.7.0
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run local docs CI
        run: ./scripts/ci_local.sh
