name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "docs/platform/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/platform-contracts-combined-ref.yml"
      - "requirements-ci.txt"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.json"
      - "runtime-state/**"
      - "docs/platform/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/platform-contracts-combined-ref.yml"
      - "requirements-ci.txt"

jobs:
  markdown-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          clean: true
          persist-credentials: false

      - name: Checkout trusted PR base manifest
        if: github.event_name == 'pull_request'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Project-Helianthus/helianthus-docs-ebus
          ref: ${{ github.event.pull_request.base.sha }}
          path: .trusted-base/docs-ebus
          clean: true
          persist-credentials: false
          sparse-checkout: docs/platform/manifests/eebus-doc-ownership.yaml
          sparse-checkout-cone-mode: false

      - name: Resolve trusted prior manifest
        if: github.event_name == 'pull_request'
        id: prior_manifest
        shell: bash
        run: |
          prior="${GITHUB_WORKSPACE}/.trusted-base/docs-ebus/docs/platform/manifests/eebus-doc-ownership.yaml"
          if [[ -e "${prior}" ]]; then
            [[ -f "${prior}" && ! -L "${prior}" ]]
            echo "path=${prior}" >> "${GITHUB_OUTPUT}"
          else
            echo "path=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.10"

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Set up Go (for santhosh-tekuri/jsonschema/cmd/jv)
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22.12"

      - name: Install jv (santhosh-tekuri/jsonschema CLI)
        run: |
          go install github.com/santhosh-tekuri/jsonschema/cmd/jv@v0.7.0
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run local docs CI
        env:
          PLATFORM_TOOLCHAIN_MODE: exact
          PLATFORM_PRIOR_MANIFEST: ${{ steps.prior_manifest.outputs.path }}
        run: ./scripts/ci_local.sh

      - name: Enforce main manifest expiry
        if: github.event_name == 'push'
        run: |
          python3 scripts/validate_platform_contracts.py \
            --mode main-expiry \
            --docs-ebus-root . \
            --evaluated-at "${{ github.event.head_commit.timestamp }}" \
            --evaluation-source github.event.head_commit.timestamp \
            --enforce-through MSP-DOCS-PLATFORM \
            --toolchain-mode exact

  platform-contracts-combined-ref:
    name: Platform Contracts Combined Ref
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/platform-contracts-combined-ref.yml
    with:
      docs_ebus_ref: ${{ github.event.pull_request.head.sha }}
      docs_ebus_base_ref: ${{ github.event.pull_request.base.sha }}
      docs_eebus_ref: f23a7c35e6803501f185923de061f935bbac1466
      eebusreg_ref: 0e58327dfdb86ef243a19e18d590564813feaa00
      enforce_through: MSP-DOCS-PLATFORM
